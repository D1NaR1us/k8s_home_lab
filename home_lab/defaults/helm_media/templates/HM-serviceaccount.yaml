apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-media-sa
  namespace: home-media

---
# Allows home-media pods to use their ServiceAccount token for Vault K8s auth.
# Vault's kubernetes auth backend reads the pod's JWT to verify identity.
# No cluster-wide permissions needed -- Vault does the validation internally.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: home-media-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: home-media-sa
  namespace: home-media
