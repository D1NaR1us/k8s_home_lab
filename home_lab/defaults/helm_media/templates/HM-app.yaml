apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  namespace: home-media
  labels:
    main: hm-app
    app: {{ .Release.Name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      main: hm-app
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        main: hm-app
        app: {{ .Release.Name }}-app
    spec:
      {{- if .Values.postgres.enabled }}
      initContainers:
      - name: postgres-config-init
        image: busybox:1.36
        env:
        - name: PG_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgres-creds
              key: user
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgres-creds
              key: password
        - name: PG_HOST
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgres-creds
              key: host
        - name: PG_PORT
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgres-creds
              key: port
        - name: CONFIG_PATH
          value: /config/config.xml
        command:
        - /bin/sh
        - -c
        - |
          echo "Checking config.xml..."

          PG_BLOCK="  <PostgresUser>${PG_USER}</PostgresUser>
            <PostgresPassword>${PG_PASS}</PostgresPassword>
            <PostgresPort>${PG_PORT}</PostgresPort>
            <PostgresHost>${PG_HOST}</PostgresHost>
            <AnalyticsEnabled>False</AnalyticsEnabled>
            <UpdateAutomatically>True</UpdateAutomatically>"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo "config.xml not found, creating with Postgres block..."
            cat > $CONFIG_PATH <<EOF
          <Config>
          ${PG_BLOCK}
          </Config>
          EOF
            echo "config.xml created."
          else
            echo "config.xml exists, checking for Postgres block..."
            if grep -q "<PostgresUser>" $CONFIG_PATH; then
              echo "Postgres block already present, skipping."
            else
              sed -i "s|</Config>|${PG_BLOCK}\n</Config>|" $CONFIG_PATH
              echo "Postgres block injected."
            fi
          fi
        volumeMounts:
        - name: hm-volume
          mountPath: /config
          subPath: data_my/home-media/{{ .Release.Name }}/config
        {{- if .Values.container.extraVolumeMounts }}
        {{- toYaml .Values.container.extraVolumeMounts | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.container.image }}
        imagePullPolicy: Always
        env:
        - name: TZ
          value: "Europe/Sofia"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        {{- if .Values.container.extraEnv }}
        {{- toYaml .Values.container.extraEnv | nindent 8 }}
        {{- end }}
        ports:
        - name: {{ .Release.Name }}-web
          containerPort: {{ .Values.container.port }}
        volumeMounts:
        - name: hm-volume
          mountPath: /data/downloads
          subPath: data_my/Downloads
        - name: hm-volume
          mountPath: /config
          subPath: data_my/home-media/{{ .Release.Name }}/config
        resources:
          requests:
            memory: 500Mi
            cpu: 256m
          limits:
            memory: 500Mi
            cpu: 500m
      volumes:
      - name: hm-volume
        persistentVolumeClaim:
          claimName: hm-claim
      {{- if .Values.extraVolumes }}
      {{- toYaml .Values.extraVolumes | nindent 6 }}
      {{- end }}
