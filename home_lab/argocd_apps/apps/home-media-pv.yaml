apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-media-pv
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: home-media
  source:
    path: home_lab/defaults/home-media_pv_secret
    repoURL: https://github.com/D1NaR1us/k8s_home_lab.git
    targetRevision: HEAD
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
