apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: homepage
  namespace: argocd
spec: 
  destination:
    name: in-cluster
    namespace: home-media
  source:
    path: home_lab/defaults/helm_media
    repoURL: https://github.com/D1NaR1us/k8s_home_lab.git
    targetRevision: HEAD
    helm:
      values: |
        container:
          image: ghcr.io/gethomepage/homepage:latest
          port: 3000
          extraEnv:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "homepage.home.lab"
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
